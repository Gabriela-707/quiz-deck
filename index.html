<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Deck</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <h1>Quiz Deck</h1>
        <p class="description">Create, study, and master flashcards with ease. Your personal deck of knowledge.</p>

        <!-- deck controls -->
        <section class="deck-controls">
            <label for="deck-select">Deck:</label>
            <select id="deck-select"></select>
            <button id="new-deck-btn" type="button">New Deck</button>
            <button id="quiz-mode-btn" type="button">Start Quiz</button>
        </section>

        <!-- tag filtering -->
        <section class="tag-filter">
            <label for="tag-filter">Filter by tag:</label>
            <select id="tag-filter">
                <option value="">All</option>
            </select>
        </section>

        <!-- card creation form -->
        <section class="card-form">
            <h2>New Card</h2>
            <form id="new-card-form">
                <div class="form-group">
                    <label for="question">Question</label>
                    <input type="text" id="question" name="question" required>
                </div>
                <div class="form-group">
                    <label for="answer">Answer</label>
                    <input type="text" id="answer" name="answer" required>
                </div>
                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" name="tags" placeholder="e.g. vocab, spanish">
                </div>
                <button type="submit">Add Card</button>
            </form>
        </section>

        <!-- display area for a single flashcard -->
        <section class="card-display">
            <div id="flashcard" class="card">
                <div class="card-inner" id="flashcard-inner">
                    <div class="card-face card-front" id="flashcard-front">
                        <div class="card-text" id="flashcard-front-text">No cards yet</div>
                        <div class="card-tags" id="flashcard-tags"></div>
                    </div>
                    <div class="card-face card-back" id="flashcard-back">
                        <div class="card-text" id="flashcard-back-text"></div>
                    </div>
                </div>
            </div>
            <div class="controls">
                <button id="prev-btn">Previous</button>
                <button id="next-btn">Next</button>
                <button id="delete-btn" class="danger">Delete</button>
            </div>
        </section>

        <!-- quiz mode panel -->
        <section id="quiz-panel" class="quiz-panel" hidden>
            <div class="quiz-header">
                <span id="quiz-progress">0 / 0</span>
            </div>
            <div class="quiz-input">
                <label for="quiz-answer">Your answer</label>
                <input id="quiz-answer" type="text" autocomplete="off" />
                <button id="quiz-check" type="button">Check</button>
            </div>
            <div id="quiz-feedback" class="quiz-feedback"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
