<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Deck</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="nav-bar">
        <button id="nav-home" class="nav-btn active">Home</button>
        <button id="nav-create" class="nav-btn">Create Deck</button>
        <button id="nav-edit" class="nav-btn">Edit Decks</button>
        <button id="nav-quiz" class="nav-btn">Quiz</button>
    </nav>

    <main class="container">
        <!-- Home Screen -->
        <section id="home-screen" class="screen">
            <h1>Quiz Deck</h1>
            <p class="description">Create, study, and master flashcards with ease. Your personal deck of knowledge.</p>
            <div id="deck-list" class="deck-list">
                <!-- Decks will be listed here -->
            </div>
            <button id="create-deck-from-home" class="btn-primary">Create New Deck</button>
        </section>

        <!-- Create Deck Screen -->
        <section id="create-screen" class="screen hidden">
            <h1>Create New Deck</h1>
            <form id="create-deck-form">
                <div class="form-group">
                    <label for="deck-name">Deck Name</label>
                    <input type="text" id="deck-name" name="deck-name" required>
                </div>
                <button type="submit" class="btn-primary">Create Deck</button>
            </form>
        </section>

        <!-- Edit Deck Screen -->
        <section id="edit-screen" class="screen hidden">
            <h1>Edit Decks</h1>
            <div class="deck-controls">
                <label for="edit-deck-select">Select Deck to Edit:</label>
                <select id="edit-deck-select"></select>
            </div>
            <div id="edit-deck-info" class="edit-deck-info" hidden>
                <h2 id="edit-deck-title">Deck Name</h2>
                <div class="deck-stats">Cards: <span id="edit-deck-card-count">0</span></div>
                <div class="deck-actions">
                    <button id="rename-deck-btn" class="btn-secondary">Rename Deck</button>
                    <button id="delete-deck-btn" class="btn-danger">Delete Deck</button>
                </div>
                <div class="card-management">
                    <h3>Manage Cards</h3>
                    <div id="edit-card-list" class="edit-card-list">
                        <!-- Cards will be listed here -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Quiz Screen -->
        <section id="quiz-screen" class="screen hidden">
            <h1>Quiz Mode</h1>
            <div class="deck-controls">
                <label for="quiz-deck-select">Select Deck:</label>
                <select id="quiz-deck-select"></select>
            </div>
            <div class="tag-filter">
                <label for="quiz-tag-filter">Filter by tag:</label>
                <select id="quiz-tag-filter">
                    <option value="">All</option>
                </select>
            </div>
            <div class="card-display">
                <div id="quiz-flashcard" class="card">
                    <div class="card-inner" id="quiz-flashcard-inner">
                        <div class="card-face card-front" id="quiz-flashcard-front">
                            <div class="card-text" id="quiz-flashcard-front-text">Select a deck to start</div>
                            <div class="card-tags" id="quiz-flashcard-tags"></div>
                        </div>
                        <div class="card-face card-back" id="quiz-flashcard-back">
                            <div class="card-text" id="quiz-flashcard-back-text"></div>
                        </div>
                    </div>
                </div>
                <div class="controls">
                    <button id="quiz-prev-btn">Previous</button>
                    <button id="quiz-next-btn">Next</button>
                    <button id="delete-btn" class="btn-danger">Delete Card</button>
                </div>
            </div>
            <div id="quiz-panel" class="quiz-panel" hidden>
                <div class="quiz-header">
                    <span id="quiz-progress">0 / 0</span>
                </div>
                <div class="quiz-input">
                    <label for="quiz-answer">Your answer</label>
                    <input id="quiz-answer" type="text" autocomplete="off" />
                    <button id="quiz-check" type="button">Check</button>
                </div>
                <div id="quiz-feedback" class="quiz-feedback"></div>
            </div>
            <div class="card-creation">
                <h2>Add New Card</h2>
                <form id="new-card-form">
                    <div class="form-group">
                        <label for="question">Question</label>
                        <input type="text" id="question" name="question" required>
                    </div>
                    <div class="form-group">
                        <label for="answer">Answer</label>
                        <input type="text" id="answer" name="answer" required>
                    </div>
                    <div class="form-group">
                        <label for="tags">Tags (comma-separated)</label>
                        <input type="text" id="tags" name="tags" placeholder="e.g., math, algebra, equations">
                    </div>
                    <button type="submit" class="btn-primary">Add Card</button>
                </form>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
